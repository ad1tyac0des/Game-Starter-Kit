<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS Game Starter Kit</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <!-- Main Menu -->
        <div id="mainMenu" class="ui-panel">
            <h1>Game Starter Kit</h1>
            <button id="playBtn">Play</button>
            <div>
                <p>WASD - Move</p>
                <p>ESC - Pause</p>
            </div>
        </div>

        <!-- Pause Menu -->
        <div id="pauseMenu" class="ui-panel">
            <h2>PAUSED</h2>
            <button id="resumeBtn">RESUME</button>
            <button id="quitBtn">QUIT TO MENU</button>
        </div> 

        <!-- Loading Screen -->
        <div id="loadingScreen" class="ui-panel active">
            <h2>Loading...</h2>
            <p>Please wait while we prepare the game.</p>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
